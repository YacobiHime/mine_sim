# Gate Minecraft Proxy Configuration
# For mine_sim Forge integration

config:
  # Bind address for incoming connections (mineflayer bots connect here)
  bind: 0.0.0.0:25565

  # Backend servers
  servers:
    forge-server:
      address: localhost:25566
      # 特殊設定: Forgeサーバーへの接続を許可
      # バニラクライアント（mineflayer）からの接続を受け入れる

  # Connection order
  try:
    - forge-server

  # Allow offline mode clients (mineflayer bots use offline auth)
  onlineMode: false

  # Forwarding mode - "none" for offline mode without velocity forwarding
  forwarding:
    mode: none

  # Announce as Forge-compatible server (required for FML handshake)
  announceForge: true

  # Force Forge handshake to be skipped (for vanilla clients)
  # This allows mineflayer to connect through Gate to Forge backend
  java:
    # バニラクライアントをForgeサーバーに転送する際の特別設定
    # FMLハンドシェイクをバイパスする設定
    forgeSupport: true

  # Increase read timeout for Forge
  readTimeout: 60s

  # Increase connection timeout
  connectionTimeout: 10s

  # Rate limiting disabled for local development
  quota:
    connections:
      enabled: false
    logins:
      enabled: false
  packetLimiter:
    packetsPerSecond: 0
    bytesPerSecond: 0

  # Status/MOTD configuration
  status:
    motd: |
      §bMineSim Forge Proxy
      §eGate connecting to Forge 1.20.1
